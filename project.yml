name: DashDock
options:
  bundleIdPrefix: com.bami
  deploymentTarget:
    macOS: "14.0"
    watchOS: "10.0"
  xcodeVersion: "15.0"
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_IDENTITY: "Apple Development"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
  configs:
    Debug:
      SWIFT_OPTIMIZATION_LEVEL: -Onone
    Release:
      SWIFT_OPTIMIZATION_LEVEL: -O

configFiles:
  Debug: Config.xcconfig
  Release: Config.xcconfig

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    exactVersion: "2.6.4"

targets:
  DashDock:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: DashDock
        excludes:
          - "**/.DS_Store"
      - path: DashDockShared
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bami.dashdock
        INFOPLIST_FILE: DashDock/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: DashDock/Resources/DashDock.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: true
        ENABLE_HARDENED_RUNTIME: false
    dependencies:
      - target: DashDockWidgets
        embed: true
      - package: Sparkle
    entitlements:
      path: DashDock/Resources/DashDock.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
        com.apple.security.network.server: true

  DashDockWidgets:
    type: app-extension
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: DashDockWidgets
        excludes:
          - "**/.DS_Store"
      - path: DashDockShared
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bami.dashdock.widgets
        INFOPLIST_FILE: DashDockWidgets/Info.plist
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @executable_path/../../../../Frameworks"
        CODE_SIGN_ENTITLEMENTS: DashDockWidgets/DashDockWidgets.entitlements
    entitlements:
      path: DashDockWidgets/DashDockWidgets.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
    dependencies: []

  DashDockWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: DashDockWatch
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bami.dashdock.watch
        INFOPLIST_FILE: DashDockWatch/Info.plist
    dependencies: []
